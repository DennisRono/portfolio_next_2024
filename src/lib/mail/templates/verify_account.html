<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Activation</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <style>
      .nullchemy-body {
        display: block;
        padding: 0px;
        margin: 0px;
      }

      .nullchemy-wrapper {
        width: 100%;
        display: block;
        overflow: hidden;
        box-sizing: border-box;
        color: #222;
        background: #f2f2fd;
        font-size: 18px;
        font-weight: normal;
        font-family: 'Baloo 2', 'Open Sans', 'Roboto', 'Segoe UI',
          'Helvetica Neue', Helvetica, Tahoma, Arial, monospace, sans-serif;
      }

      .nullchemy-table {
        border-collapse: collapse;
        border-spacing: 0;
        border: 0px;
        width: 640px;
        max-width: 100%;
        margin: 100px auto;
        box-shadow: 0px 20px 48px rgba(0, 0, 0, 0.2);
        border-radius: 10px;
        overflow: hidden;
      }

      .nullchemy-table tr {
        background: #ffffff;
      }

      .nullchemy-table td,
      .nullchemy-table th {
        border: 0px;
        border-spacing: 0;
        border-collapse: collapse;
      }

      .nullchemy-table tr td {
        padding: 0px 40px;
        box-sizing: border-box;
      }

      .nullchemy-margin {
        float: left;
        width: 100%;
        overflow: hidden;
        height: 40px;
        padding-bottom: 0px;
        box-sizing: border-box;
      }

      .nullchemy-div {
        float: left;
        width: 100%;
        overflow: hidden;
        box-sizing: border-box;
      }

      .nullchemy-table h1,
      .nullchemy-table h2,
      .nullchemy-table h3,
      .nullchemy-table h4 {
        float: left;
        width: 100%;
        margin: 0px 0px 20px 0px !important;
        padding: 0px;
      }

      .nullchemy-table h1 {
        font-size: 33px;
      }

      .nullchemy-table h2 {
        font-size: 26px;
      }

      .nullchemy-table h3 {
        font-size: 23px;
      }

      .nullchemy-table p {
        float: left;
        width: 100%;
        font-size: 18px;
        margin: 0px 0px 20px 0px !important;
      }

      .nullchemy-table h4 {
        font-size: 20px;
      }

      .nullchemy-table a {
        color: #6d49fc;
        font-weight: bold;
      }

      .nullchemy-table a:hover {
        color: #55cc55;
      }

      .nullchemy-table a:active {
        color: #ff6600;
      }

      .nullchemy-table a:visited {
        color: #ff00ff;
      }

      .nullchemy-table a.nullchemy-link {
        display: inline-block;
        width: auto !important;
        outline: none !important;
        text-decoration: none !important;
      }

      .nullchemy-table img,
      .nullchemy-table a img {
        display: block;
        max-width: 100%;
        margin-bottom: 20px;
        border: 0px;
        border-radius: 10px;
        overflow: hidden;
      }

      .nullchemy-table a.nullchemy-button {
        display: inline-block;
        font-weight: bold;
        font-size: 17px;
        padding: 15px 40px;
        margin: 20px 0px;
        color: #ffffff !important;
        background: #6d49fc !important;
        border-radius: 10px;
        text-decoration: none;
        outline: none;
      }

      .nullchemy-table a.nullchemy-button:hover {
        color: #ffffff !important;
        background: #55cc55 !important;
      }

      .nullchemy-code {
        float: left;
        width: 100%;
        overflow: hidden;
        box-sizing: border-box;
        padding: 15px 40px;
        margin: 20px 0px;
        border: 1px dashed #6d49fcaa;
        background: #6d49fc11;
        color: #6d49fc;
        font-weight: 700;
        font-size: 23px;
      }

      .nullchemy-flex {
        float: left;
        width: 100%;
        text-align: center;
      }

      .nullchemy-divider {
        float: left;
        width: 100%;
        overflow: hidden;
        margin: 20px 0px;
        border-top: 2px solid #f2f2fd;
      }
    </style>

    <style>
      .nullchemy-flex img {
        margin: 10px;
        max-width: 15%;
        width: 40px;
      }
    </style>
  </head>

  <body class="nullchemy-body">
    <div class="nullchemy-wrapper">
      <table class="nullchemy-table">
        <tbody>
          <tr class="nullchemy-tr">
            <td class="nullchemy-td" colspan="10">
              <div class="nullchemy-margin"></div>
              <center>
                <h1>Welcome to nullchemy Shop!</h1>
                <img
                  src="https://shop.nullchemy.com/images/welcome_frame.png"
                  alt="Image"
                />
              </center>
              <h2>Confirm email address</h2>
              <p>Activate your email address.</p>
              <p>This Verification Link will Expire in 48 Hours!</p>
            </td>
          </tr>

          <tr class="nullchemy-tr">
            <td class="nullchemy-td" colspan="10">
              <center>
                <a
                  href="{{verification_link}}"
                  class="nullchemy-button"
                  target="_blank"
                  >Confirm Email</a
                >
              </center>
            </td>
          </tr>

          <tr class="nullchemy-tr">
            <td class="nullchemy-td" colspan="10">
              <p>
                If you didn't request this! you can safely ignore this email
              </p>
            </td>
          </tr>
          <tr class="nullchemy-tr">
            <td class="nullchemy-td" colspan="10">
              <div class="nullchemy-divider"></div>
              <center><h3>nullchemy shop</h3></center>
              <center>
                <span style="color: #706d6b"
                  >© 2024 nullchemy shop <br />
                  Westlands, Parklands Road, KE 10001</span
                >
              </center>

              <div class="nullchemy-margin"></div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </body>
</html>
